<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Just GPT It</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Theme toggle -->
  <div class="theme-toggle-btn">
    <button onclick="toggleTheme()" title="Alternar Tema">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <!-- HOME screen -->
  <div id="home" class="home-screen">
    <div class="home-header">
      <div class="logo-badge">GPT</div>
      <h1 class="home-title">Just GPT It</h1>
      <p class="home-subtitle">Porque algumas perguntas já foram respondidas 😄</p>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <input
          type="text"
          id="pergunta"
          class="chat-input"
          placeholder="O que a pessoa deveria ter perguntado ao ChatGPT?"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') gerarLink()"
        />
        <button class="send-btn" onclick="gerarLink()" title="Gerar Link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Gere um link e mande para aquela pessoa 😏</p>
    </div>

    <div id="resultado" class="result-box"></div>
  </div>

  <!-- ANIMATION screen -->
  <div id="animacao" class="hidden anim-screen">
    <div class="anim-header">
      <div class="anim-logo">
        <div class="logo-badge small">GPT</div>
        <span>ChatGPT</span>
      </div>
    </div>

    <div class="anim-messages"></div>

    <div class="anim-input-row">
      <div class="anim-input-box">
        <div id="fakeSearch" class="fake-search-text" data-placeholder="Mensagem para o ChatGPT"></div>
        <div id="fakeSend" class="anim-send-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </div>
      </div>
    </div>

    <p class="anim-disclaimer">Redirecionando você ao ChatGPT…</p>
  </div>

  <!-- Fake cursor -->
  <div class="fake-mouse" id="fakeMouse">
    <img src="assets/svg/cursor.svg" alt="cursor" />
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
